fitlife_reservatie.lessen:
  path: '/lessen'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\ReservatieController::lessen'
    _title: 'Groepslessen'
  requirements:
    _permission: 'access content'

fitlife_reservatie.reserveer:
  path: '/lessen/reserveer/{les_id}'
  defaults:
    _form: '\Drupal\fitlife_reservatie\Form\ReservatieForm'
    _title: ' '
  requirements:
    _user_is_logged_in: 'TRUE'

fitlife_reservatie.mijn_reservaties:
  path: '/mijn-reservaties'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\ReservatieController::mijnReservaties'
    _title: ''
  requirements:
    _user_is_logged_in: 'TRUE'

fitlife_reservatie.uitschrijven:
  path: '/lessen/uitschrijven/{les_id}'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\ReservatieController::uitschrijven'
    _title: 'Uitschrijven'
  requirements:
    _user_is_logged_in: 'TRUE'
fitlife_reservatie.mijn_bestellingen:
  path: '/mijn-bestellingen'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\AccountRedirectController::bestellingen'
    _title: 'Mijn bestellingen'
  requirements:
    _user_is_logged_in: 'TRUE'
fitlife_reservatie.mijn_adressen:
  path: '/mijn-adressen'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\AccountRedirectController::adressen'
    _title: 'Mijn adressen'
  requirements:
    _user_is_logged_in: 'TRUE'
fitlife_reservatie.mijn_profiel:
  path: '/mijn-profiel'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\AccountRedirectController::profiel'
    _title: 'Mijn profiel'
  requirements:
    _user_is_logged_in: 'TRUE'

fitlife_reservatie.rol_toevoegen:
  path: '/admin/leden/rol-toevoegen'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\LedenController::rolToevoegen'
    _title: 'Rol toevoegen'
  methods: [POST]
  requirements:
    _permission: 'administer users'

fitlife_reservatie.rol_verwijderen:
  path: '/admin/leden/rol-verwijderen'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\LedenController::rolVerwijderen'
    _title: 'Rol verwijderen'
  methods: [POST]
  requirements:
    _permission: 'administer users'

fitlife_reservatie.les_toevoegen:
  path: '/admin/lessen/toevoegen'
  defaults:
    _form: '\Drupal\fitlife_reservatie\Form\LesToevoegenForm'
    _title: 'Groepsles toevoegen'
  requirements:
    _permission: 'administer users'

fitlife_reservatie.les_beheren:
  path: '/admin/lessen/beheren/{les_id}'
  defaults:
    _form: '\Drupal\fitlife_reservatie\Form\LesBeheerForm'
    _title: 'Les beheren'
  requirements:
    _custom_access: '\Drupal\fitlife_reservatie\Controller\ReservatieController::lesBeheerToegang'

fitlife_reservatie.les_verwijderen:
  path: '/admin/lessen/verwijderen/{les_id}'
  defaults:
    _form: '\Drupal\fitlife_reservatie\Form\LesVerwijderForm'
    _title: 'Les verwijderen'
  requirements:
    _custom_access: '\Drupal\fitlife_reservatie\Controller\ReservatieController::lesBeheerToegang'

fitlife_reservatie.contact_overzicht:
  path: '/admin/contactberichten'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\LedenController::contactOverzicht'
    _title: 'Contactberichten'
  requirements:
    _permission: 'administer users'

fitlife_reservatie.contact_status:
  path: '/admin/contactberichten/status'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\LedenController::contactStatus'
  methods: [POST]
  requirements:
    _permission: 'administer users'

fitlife_reservatie.contact_verwijderen:
  path: '/admin/contactberichten/verwijderen'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\LedenController::contactVerwijderen'
  methods: [POST]
  requirements:
    _permission: 'administer users'
