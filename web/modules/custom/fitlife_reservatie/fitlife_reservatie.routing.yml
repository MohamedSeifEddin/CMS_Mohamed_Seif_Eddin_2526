fitlife_reservatie.lessen:
  path: '/lessen'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\ReservatieController::lessen'
    _title: 'Groepslessen'
  requirements:
    _permission: 'access content'

fitlife_reservatie.reserveer:
  path: '/lessen/reserveer/{les_id}'
  defaults:
    _form: '\Drupal\fitlife_reservatie\Form\ReservatieForm'
    _title: 'Reserveer een les'
  requirements:
    _user_is_logged_in: 'TRUE'

fitlife_reservatie.mijn_reservaties:
  path: '/mijn-reservaties'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\ReservatieController::mijnReservaties'
    _title: 'Mijn Reservaties'
  requirements:
    _user_is_logged_in: 'TRUE'

fitlife_reservatie.uitschrijven:
  path: '/lessen/uitschrijven/{les_id}'
  defaults:
    _controller: '\Drupal\fitlife_reservatie\Controller\ReservatieController::uitschrijven'
    _title: 'Uitschrijven'
  requirements:
    _user_is_logged_in: 'TRUE'
